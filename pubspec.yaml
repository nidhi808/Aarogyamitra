name: voice_health_navigator
description: "Voice Health Navigator - Offline health scheme assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.5
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  intl: ^0.19.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
  csv: ^6.0.0
  sqflite: ^2.3.3+3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/schemes.json
    - assets/data/facilities.json
    - assets/data/translations.json
    - assets/data/doctors.csv
    - assets/data/schemes.csv
    - assets/data/hospitals.csv